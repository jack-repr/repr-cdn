<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connected — REPR</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Montserrat',-apple-system,sans-serif;background:radial-gradient(circle at 50% 0%,#141414,#000 70%);
       color:#f2f2f2;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .card{max-width:440px}
  .logo{font-weight:800;font-size:30px;letter-spacing:1px;margin-bottom:34px}.logo b{color:#5EE5C5}
  .tick{width:88px;height:88px;border-radius:50%;background:rgba(94,229,197,.14);color:#5EE5C5;
        display:flex;align-items:center;justify-content:center;font-size:46px;margin:0 auto 24px}
  h1{font-size:24px;font-weight:700;margin-bottom:10px}
  p{color:#9a9a9a;font-size:15px;line-height:1.5}
  .foot{margin-top:30px;color:#6a6a6a;font-size:12px}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">REP<b>R</b></div>
    <div class="tick">&#10003;</div>
    <h1>Connected to REPR</h1>
    <p>Your TikTok account is now connected to the REPR Publisher. You can close this window and return to the app.</p>
    <div class="foot">REPR Fitness Limited</div>
  </div>
</body>
</html>
